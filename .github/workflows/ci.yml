name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          CI: true

  integration:
    name: Integration (isolated Supabase)
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start isolated Supabase stack
        run: supabase start

      - name: Export isolated database credentials
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|SERVICE_ROLE_KEY|ANON_KEY)=')"
          {
            echo "TEST_SUPABASE_URL=$API_URL"
            echo "TEST_SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "TEST_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"

      - name: Integration tests
        run: npm run test:integration

      - name: Database lint
        run: supabase db lint || true

      - name: Stop Supabase
        if: always()
        run: supabase stop
